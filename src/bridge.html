<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAM-Stream Player Bridge</title>
<style>
  body {
    margin: 0;
    padding: 0;
    background: #0a0a0a;
    color: #e0e0e0;
    font-family: Consolas, monospace;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    flex-direction: column;
  }
  .card {
    background: #1a1a2e;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 30px 40px;
    text-align: center;
    max-width: 500px;
    min-width: 360px;
  }
  h1 { color: #00d4ff; margin: 0 0 20px 0; font-size: 20px; }
  .status { font-size: 14px; padding: 12px; border-radius: 4px; margin: 15px 0; }
  .status.ok { background: #1a3a1a; color: #4f4; }
  .status.err { background: #3a1a1a; color: #f44; }
  .status.info { background: #1a1a3a; color: #0cf; }
  .countdown { font-size: 13px; color: #888; margin-top: 8px; }
  .troubleshoot {
    text-align: left;
    font-size: 12px;
    margin-top: 12px;
    padding: 10px;
    background: #0f0f1a;
    border-radius: 4px;
    line-height: 1.6;
  }
  .troubleshoot ol { margin: 6px 0 0 16px; padding: 0; }
  .troubleshoot li { margin: 3px 0; }
  button {
    background: #008000;
    color: #fff;
    border: none;
    padding: 10px 24px;
    font-size: 14px;
    cursor: pointer;
    border-radius: 4px;
    margin: 5px;
  }
  button.back { background: #444; }
  button:hover { opacity: 0.85; }

  /* ── Spinner ── */
  .spinner {
    display: inline-block;
    width: 36px;
    height: 36px;
    border: 3px solid rgba(0, 212, 255, 0.2);
    border-top: 3px solid #00d4ff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 10px auto;
  }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
</style>
</head>
<body>
<div class="card">
  <h1>RAM-Stream Bridge</h1>
  <div class="spinner" id="spinner"></div>
  <div id="status" class="status info">Connecting to Rust backend...</div>
  <div id="countdown" class="countdown"></div>
  <div id="troubleshoot" class="troubleshoot" style="display:none;"></div>
  <div id="actions" style="display:none;">
    <button id="btn-back" class="back">⬅ Back to B站</button>
  </div>
</div>

<script>
(function() {
  var statusEl = document.getElementById('status');
  var spinnerEl = document.getElementById('spinner');
  var countdownEl = document.getElementById('countdown');
  var troubleshootEl = document.getElementById('troubleshoot');
  var actionsEl = document.getElementById('actions');

  function setStatus(msg, cls) {
    statusEl.textContent = msg;
    statusEl.className = 'status ' + (cls || 'info');
  }

  function hideSpinner() {
    spinnerEl.style.display = 'none';
  }

  function getInvoke() {
    if (window.__TAURI_INTERNALS__ && typeof window.__TAURI_INTERNALS__.invoke === 'function') {
      return window.__TAURI_INTERNALS__.invoke.bind(window.__TAURI_INTERNALS__);
    }
    if (window.__TAURI__ && window.__TAURI__.core && window.__TAURI__.core.invoke) {
      return window.__TAURI__.core.invoke.bind(window.__TAURI__.core);
    }
    return null;
  }

  // Read data from window.name (set by preload.js on B站)
  var data = null;
  try {
    if (window.name && window.name.length > 10) {
      data = JSON.parse(window.name);
      // Clear window.name after reading
      window.name = '';
      console.log('[Bridge] Received data:', Object.keys(data));
    }
  } catch(e) {
    console.error('[Bridge] Failed to parse window.name:', e);
  }

  var invoke = getInvoke();
  console.log('[Bridge] IPC available:', !!invoke);

  if (!invoke) {
    hideSpinner();
    setStatus('IPC not available — are we on the right origin?', 'err');
    showTroubleshooting('IPC bridge not found. The bridge page must be loaded from the Tauri app origin (localhost:1420).');
  } else if (!data || !data.cookies || !data.playinfo) {
    hideSpinner();
    setStatus('No data received. Go to B站, open a video, then click ▶ Play in mpv.', 'err');
    showTroubleshooting(
      'No data was received from B站.\n' +
      '1. Navigate to a video page on B站.\n' +
      '2. Wait for "__playinfo__" to appear in the debug toolbar.\n' +
      '3. Click the ▶ Play in mpv button.'
    );
    actionsEl.style.display = 'block';
  } else {
    setStatus('Sending data to Rust backend...');
    invoke('submit_cookies', { cookies: data.cookies })
      .then(function(result) {
        console.log('[Bridge] Cookies sent:', result);
        return invoke('submit_playinfo', { jsonStr: data.playinfo });
      })
      .then(function(result) {
        console.log('[Bridge] Playinfo sent:', result);
        hideSpinner();
        setStatus('🚀 Player launching! The mpv window should appear shortly.', 'ok');

        // Auto-close countdown: navigate back to B站 after 3 seconds
        var seconds = 3;
        countdownEl.textContent = 'Returning to B站 in ' + seconds + '...';
        var timer = setInterval(function() {
          seconds--;
          if (seconds <= 0) {
            clearInterval(timer);
            window.location.href = 'https://www.bilibili.com';
          } else {
            countdownEl.textContent = 'Returning to B站 in ' + seconds + '...';
          }
        }, 1000);

        // Also show back button in case user wants to stay
        actionsEl.style.display = 'block';
      })
      .catch(function(e) {
        hideSpinner();
        console.error('[Bridge] IPC error:', e);
        var errMsg = String(e);
        setStatus('IPC failed: ' + errMsg, 'err');
        showTroubleshooting(
          'The IPC call failed. Possible causes:\n' +
          '1. The Tauri app may have been closed — restart it.\n' +
          '2. The backend command handler may have crashed — check the console output.\n' +
          '3. Error: ' + errMsg
        );
        actionsEl.style.display = 'block';
      });
  }

  function showTroubleshooting(msg) {
    var lines = msg.split('\n');
    var html = '<strong>Troubleshooting:</strong><ol>';
    lines.forEach(function(line) {
      var trimmed = line.trim();
      if (trimmed) html += '<li>' + trimmed + '</li>';
    });
    html += '</ol>';
    troubleshootEl.innerHTML = html;
    troubleshootEl.style.display = 'block';
  }

  // Back to B站 button
  document.getElementById('btn-back').addEventListener('click', function() {
    window.location.href = 'https://www.bilibili.com';
  });
})();
</script>
</body>
</html>
